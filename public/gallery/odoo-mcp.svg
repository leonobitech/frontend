<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="odoo-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B3FF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="odoo-accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#odoo-bg-gradient)"/>

  <!-- Grid Pattern -->
  <pattern id="odoo-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#odoo-grid)"/>

  <!-- Decorative Circles -->
  <circle cx="150" cy="100" r="80" fill="url(#odoo-accent-gradient)" opacity="0.3"/>
  <circle cx="1050" cy="530" r="120" fill="url(#odoo-accent-gradient)" opacity="0.2"/>

  <!-- Icon Container -->
  <rect x="100" y="180" width="180" height="180" rx="20" fill="rgba(255,255,255,0.1)" stroke="url(#odoo-accent-gradient)" stroke-width="3"/>

  <!-- Odoo Logo Simplified -->
  <circle cx="190" cy="270" r="50" fill="#A855F7"/>
  <text x="190" y="285" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">O</text>

  <!-- Title -->
  <text x="320" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">
    Odoo MCP
  </text>
  <text x="320" y="310" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#E9D5FF">
    Connector
  </text>

  <!-- Subtitle -->
  <text x="320" y="370" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">
    Production-ready MCP server for Claude Desktop
  </text>

  <!-- Features -->
  <g transform="translate(100, 420)">
    <circle cx="10" cy="0" r="5" fill="#A855F7"/>
    <text x="25" y="6" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">OAuth2 + PKCE Authentication</text>

    <circle cx="10" cy="40" r="5" fill="#A855F7"/>
    <text x="25" y="46" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">8 CRM Tools (Contacts, Calendar, Email)</text>

    <circle cx="10" cy="80" r="5" fill="#A855F7"/>
    <text x="25" y="86" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Auto-progression &amp; Smart Templates</text>
  </g>

  <!-- Badge -->
  <rect x="950" y="50" width="200" height="50" rx="25" fill="rgba(255,255,255,0.15)"/>
  <text x="1050" y="83" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
    TypeScript
  </text>
</svg>
