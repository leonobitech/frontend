<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="linkedin-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A66C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004182;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkedin-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#linkedin-bg)"/>

  <pattern id="linkedin-squares" width="35" height="35" patternUnits="userSpaceOnUse">
    <rect width="35" height="35" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#linkedin-squares)"/>

  <circle cx="170" cy="115" r="85" fill="url(#linkedin-accent)" opacity="0.35"/>
  <circle cx="1030" cy="515" r="120" fill="url(#linkedin-accent)" opacity="0.28"/>

  <rect x="100" y="180" width="180" height="180" rx="20" fill="rgba(255,255,255,0.15)" stroke="url(#linkedin-accent)" stroke-width="3"/>

  <!-- LinkedIn Icon Simplified -->
  <rect x="150" y="230" width="80" height="80" rx="10" fill="#0A66C2"/>
  <text x="190" y="290" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">in</text>

  <text x="320" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">
    LinkedIn
  </text>
  <text x="320" y="310" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#BAE6FD">
    Drops Tracker
  </text>

  <text x="320" y="370" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)">
    Build-in-public journey with MCP apps
  </text>

  <g transform="translate(100, 420)">
    <circle cx="10" cy="0" r="5" fill="#38BDF8"/>
    <text x="25" y="6" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Auto-sync metrics from posts</text>

    <circle cx="10" cy="40" r="5" fill="#38BDF8"/>
    <text x="25" y="46" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Embed carousels & code snippets</text>

    <circle cx="10" cy="80" r="5" fill="#38BDF8"/>
    <text x="25" y="86" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">DM templates included</text>
  </g>

  <rect x="950" y="50" width="200" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
  <text x="1050" y="83" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
    Content SDK
  </text>
</svg>
