<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="workflow-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workflow-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#workflow-bg)"/>

  <pattern id="workflow-lines" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 0 25 L 50 25" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#workflow-lines)"/>

  <circle cx="180" cy="120" r="90" fill="url(#workflow-accent)" opacity="0.35"/>
  <circle cx="1020" cy="510" r="130" fill="url(#workflow-accent)" opacity="0.25"/>

  <rect x="100" y="180" width="180" height="180" rx="20" fill="rgba(255,255,255,0.12)" stroke="url(#workflow-accent)" stroke-width="3"/>

  <!-- Workflow Icon -->
  <circle cx="150" cy="240" r="20" fill="#34D399"/>
  <circle cx="230" cy="240" r="20" fill="#34D399"/>
  <circle cx="150" cy="320" r="20" fill="#34D399"/>
  <circle cx="230" cy="320" r="20" fill="#34D399"/>
  <line x1="170" y1="240" x2="210" y2="240" stroke="white" stroke-width="3"/>
  <line x1="150" y1="260" x2="150" y2="300" stroke="white" stroke-width="3"/>
  <line x1="230" y1="260" x2="230" y2="300" stroke="white" stroke-width="3"/>

  <text x="320" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">
    Workflow
  </text>
  <text x="320" y="310" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#D1FAE5">
    Orchestrator
  </text>

  <text x="320" y="370" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)">
    Composable canvas for marketing &amp; sales automation
  </text>

  <g transform="translate(100, 420)">
    <circle cx="10" cy="0" r="5" fill="#34D399"/>
    <text x="25" y="6" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Drag-and-drop MCP tools</text>

    <circle cx="10" cy="40" r="5" fill="#34D399"/>
    <text x="25" y="46" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Simulation mode with synthetic data</text>

    <circle cx="10" cy="80" r="5" fill="#34D399"/>
    <text x="25" y="86" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Export runnable YAML specs</text>
  </g>

  <rect x="950" y="50" width="200" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
  <text x="1050" y="83" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
    Anthropic
  </text>
</svg>
