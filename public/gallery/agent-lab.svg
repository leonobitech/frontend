<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-violet)"/>

  <pattern id="circuit" width="45" height="45" patternUnits="userSpaceOnUse">
    <circle cx="22.5" cy="22.5" r="1.5" fill="rgba(255,255,255,0.1)"/>
    <line x1="22.5" y1="0" x2="22.5" y2="22.5" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="0" y1="22.5" x2="22.5" y2="22.5" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#circuit)"/>

  <circle cx="175" cy="120" r="90" fill="url(#accent-purple)" opacity="0.4"/>
  <circle cx="1025" cy="510" r="135" fill="url(#accent-purple)" opacity="0.3"/>

  <rect x="100" y="180" width="180" height="180" rx="20" fill="rgba(255,255,255,0.13)" stroke="url(#accent-purple)" stroke-width="3"/>

  <!-- Lab Flask Icon -->
  <path d="M160 240 L160 270 L140 320 C140 330 145 335 160 340 L220 340 C235 335 240 330 240 320 L220 270 L220 240"
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="155" y1="235" x2="225" y2="235" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="190" cy="300" r="12" fill="#A78BFA"/>
  <circle cx="170" cy="310" r="8" fill="#C4B5FD"/>
  <circle cx="210" cy="315" r="6" fill="#DDD6FE"/>

  <text x="320" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">
    Leonobi
  </text>
  <text x="320" y="310" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#E9D5FF">
    Agent Lab
  </text>

  <text x="320" y="370" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)">
    Interactive playground for MCP agents & prompts
  </text>

  <g transform="translate(100, 420)">
    <circle cx="10" cy="0" r="5" fill="#A78BFA"/>
    <text x="25" y="6" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Live-edit with instant validation</text>

    <circle cx="10" cy="40" r="5" fill="#A78BFA"/>
    <text x="25" y="46" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Swap models & toolchains quickly</text>

    <circle cx="10" cy="80" r="5" fill="#A78BFA"/>
    <text x="25" y="86" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)">Share experiments via short URLs</text>
  </g>

  <rect x="950" y="50" width="200" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
  <text x="1050" y="83" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
    Browser SDK
  </text>
</svg>
